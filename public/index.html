<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
</script>


<script>
//place drawing on the canvas
    const canvas = document.getElementById("canvas");
    console.log(canvas)

    const cv = canvas.getContext("2d");
    console.log(cv);

// place for modifing the canvas 
    canvas.width = 500;
    canvas.height = 500;
    cv.fillStyle = "black";
    cv.fillRect(0, 0, canvas.width, canvas.height);





// getting mouse cordinates
    let mouseclick = 0;
    let mousex;
    let mousey;
    console.log(mouseclick);
    addEventListener("mousedown", function(e){
        mouseclick = 1;
        mousex = Number(e.clientX);
        mousey = Number(e.clientY);
        
        

        
        


    })

    addEventListener("mouseup", function(ev){

        mouseclick = 0;

        

    })

    addEventListener("mousemove", function draw(e) {
        let x1 = e.offsetX;
        let y1 = e.offsetY;
        if(mouseclick == 1) {
        let x = [mousex, mousey, x1, y1, mouseclick];
        //console.log(x);
        socket.emit("draw", x);
        //console.log("the draw got send")
            cv.strokeStyle = '#569DBE';
            cv.lineWidth = 10;

    // draw a red line
            cv.beginPath();
            cv.lineCap = "round"
            cv.moveTo(mousex, mousey);
            cv.lineTo(e.offsetX, e.offsetY);

            cv.stroke();
            mousex = e.offsetX;
            mousey = e.offsetY;
        


        }
    });

   









    
</script>
